name: Build Windows Release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    # ✅ 修复报错的关键：赋予工作流对 Release 的写入权限
    permissions:
      contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pillow pyyaml

      - name: Build Windows EXE
        run: |
          pyinstaller --windowed --onefile --name=ClashVerge_BG_Changer ClashVergeBGChanger.pyw

      - name: Upload EXE to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          files: dist/ClashVerge_BG_Changer.exe
          overwrite_files: true # ✅ 建议添加：允许覆盖同名文件，防止重复触发时报错
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
